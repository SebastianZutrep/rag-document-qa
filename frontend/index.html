<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - RAG AI</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="favicon.ico">
</head>

<body>

    <div class="auth-page">

        <!-- Logo / Nombre -->
        <div class="logo">
            🤖 RAG AI
        </div>

        <!-- Card Login -->
        <div class="auth-container">

            <h2>Iniciar sesión</h2>

            <input 
                type="email" 
                id="email" 
                placeholder="Correo electrónico"
            >

            <input 
                type="password" 
                id="password" 
                placeholder="Contraseña"
            >

            <button id="login-btn">
                Iniciar sesión
            </button>

            <p class="auth-link">
                ¿No tienes cuenta? 
                <a href="register.html">Regístrate</a>
            </p>

        </div>

    </div>

    <!-- JS SOLO de auth -->
    <script src="auth.js"></script>
    <script src="app.js"></script>

</body>
</html>
