<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RAG AI Chat</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
 
<body>
 
<div class="app-container">
 
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2 class="logo">🤖 RAG AI</h2>
 
        <button class="new-chat-btn" id="new-chat-btn">
            + Nuevo Chat
        </button>
 
        <!-- UPLOAD -->
        <div class="upload-section">
 
            <!-- Acepta todos los formatos soportados -->
            <input type="file" id="pdf-upload" accept=".pdf,.docx,.doc,.xlsx,.xls,.csv,.png,.jpg,.jpeg,.tiff,.bmp,.webp">
 
            <!-- Texto actualizado -->
            <label for="pdf-upload" class="file-label">
                Seleccionar archivo
            </label>
 
            <div id="file-name" class="file-name"></div>
 
            <!-- Texto actualizado -->
            <button id="upload-btn" class="upload-btn">
                Subir archivo
            </button>
 
        </div>
    </aside>
 
    <!-- MAIN CHAT -->
    <main class="chat-container">
 
        <div class="chat-messages" id="chat-messages">
            <div class="message bot">
                Hola 👋 Soy tu asistente RAG. Sube un archivo y hazme preguntas.
            </div>
        </div>
 
        <div class="chat-input-container">
            <input 
                type="text" 
                id="chat-input" 
                placeholder="Escribe tu pregunta..."
            >
            <button id="send-btn">Enviar</button>
        </div>
 
    </main>
 
</div>
 
<script src="chat.js"></script>
<script src="app.js"></script>
 
</body>
</html>
