<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - RAG AI</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="favicon.ico">
</head>

<body>

    <div class="auth-page">

        <!-- Logo -->
        <div class="logo">
            🤖 RAG AI
        </div>

        <!-- Card Registro -->
        <div class="auth-container">

            <h2>Crear cuenta</h2>

            <input 
                type="text" 
                id="name" 
                placeholder="Nombre"
            >

            <input 
                type="email" 
                id="email" 
                placeholder="Correo electrónico"
            >

            <input 
                type="password" 
                id="password" 
                placeholder="Contraseña"
            >

            <input 
                type="password" 
                id="confirm-password" 
                placeholder="Confirmar contraseña"
            >

            <button id="register-btn">
                Crear cuenta
            </button>

            <p class="auth-link">
                ¿Ya tienes cuenta? 
                <a href="index.html">Inicia sesión</a>
            </p>

        </div>

    </div>

    <!-- JS SOLO de auth -->
    <script src="auth.js"></script>
    <script src="app.js"></script>

</body>
</html>
